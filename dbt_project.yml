name: my_project
version: 1.0
config-version: 2

profile: snowflake_profile

# Paths
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"] 
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Models configuration
models:
  my_project:

    
    landing:
      +materialized: view
      +schema: LANDING

    
    staging:
      +materialized: incremental
      +schema: STAGING
      
    transform:
      +materialized: incremental
      +schema: INT
      

  
    mart:
      +schema: MART

     
      facts:
        +materialized: view
        +incremental_strategy: merge

snapshots:
  my_project:
    +target_schema: MART


vars:
  load_type: "incremental"
  timezone: "UTC"


on-run-start:
  - "ALTER SESSION SET TIMEZONE = 'UTC'"


quoting:
  database: false
  schema: false
  identifier: false