name: my_project
version: 1.0
config-version: 2

profile: snowflake_profile

# Paths
model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"] 
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Models configuration
models:
  my_project:

    # LANDING (optional - usually sources, but keeping as per your structure)
    landing:
      +materialized: view
      +schema: LANDING

    # STAGING LAYER (cleaned data)
    staging:
      +materialized: view
      +schema: STG

    # MART LAYER (dimensions + facts)
    mart:
      +schema: MART

      # Dimensions
      dimensions:
        +materialized: view
        +incremental_strategy: merge

        dim_customers:
          +unique_key: customer_id

        dim_products:
          +unique_key: product_id

        dim_stores:
          +unique_key: store_id

        dim_date:
          +materialized: table   # static

      # Facts
      facts:
        +materialized: view
        +incremental_strategy: merge

        fact_orders:
          +unique_key: order_id

# Seeds
seeds:
  my_project:
    +schema: SEED_DATA

# Snapshots
snapshots:
  my_project:
    +target_schema: SNAPSHOT

# Tests
data_tests:
  +store_failures: true
  +schema: TEST_FAILURES

# Variables
vars:
  load_type: "incremental"
  timezone: "UTC"

# Hooks
on-run-start:
  - "ALTER SESSION SET TIMEZONE = 'UTC'"

# Quoting
quoting:
  database: false
  schema: false
  identifier: false